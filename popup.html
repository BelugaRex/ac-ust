<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<style>
  /*
   * ===== Apple-inspired Design System =====
   * 参考资料: APPLE-DESIGN.md
   *
   * 字体策略 (无 SF Pro 时的回退):
   *  - macOS/iOS/Safari: -apple-system / BlinkMacSystemFont 直接走 SF Pro,效果与官方一致
   *  - Windows: system-ui → Segoe UI Variable/Segoe UI (微软雅黑 / 微软雅黑 UI)
   *  - Linux: system-ui → 默认无衬线字体 (Ubuntu/Droid Sans/Noto Sans)
   *  - 开源替代: Inter (Google Fonts, variable) 与 SF Pro 最接近
   *    若用户机器已安装 Inter,以下栈会自动优先使用它
   *    (若需扩展内置 Inter 字体文件以彻底对齐 Apple 美学,需另开 issue 单独打包)
   *
  * 正文、状态和表单优先保证在紧凑弹窗中的清晰层级与可读性
   */

  /* ===== Design Tokens ===== */
  :root {
    color-scheme: light dark;
    /* 颜色: 单一 Action Blue + 表面色 + 墨色文本 */
    --c-accent: #0066cc;           /* Action Blue (主交互色) */
    --c-accent-hover: #0071e3;     /* Focus Blue (键盘聚焦环) */
    --c-accent-on-dark: #2997ff;   /* 深色面用蓝 (此处基本不用) */
    --c-accent-ring: rgba(0, 102, 204, 0.16);
    --c-accent-soft: rgba(0, 102, 204, 0.08);

    --c-canvas: #ffffff;           /* 主画布白 */
    --c-parchment: #f5f5f7;        /* Apple 标志性暖白 (页面背景) */
    --c-pearl: #fafafc;            /* 次级 ghost button 比画布更浅 */

    --c-ink: #1d1d1f;              /* 标题/正文近黑墨 */
    --c-ink-80: #333333;           /* 次级文本 */
    --c-muted: #7a7a7a;            /* 远端灰 */
    --c-muted-2: #86868b;          /* 中性灰 (匄 ld 文字) */

    --c-hairline: #e0e0e0;         /* 1px 发丝边框 */
    --c-divider: #f0f0f0;          /* 软分隔线 */
    --c-chip: #d2d2d7;             /* 半透明圆形控件基色 */

    --c-success: #248a3d;
    --c-success-bg: #f5fbf6;
    --c-warning: #b25a00;
    --c-warning-bg: #fff8ef;
    --c-warning-border: rgba(178, 90, 0, 0.18);
    --c-danger: #d70015;

    /* 圆角: Apple 的系统化半径语法 (避免混用多种中等半径) */
    --r-none: 0px;
    --r-xs: 5px;
    --r-sm: 8px;
    --r-md: 11px;
    --r-lg: 18px;     /* 存储 utility card */
    --r-pill: 9999px; /* 主 CTA / 配置器 chip / 搜索框 */

    /* 间距: Apple 的 8px 基准节奏 */
    --s-xxs: 4px;
    --s-xs: 8px;
    --s-sm: 12px;
    --s-md: 17px;
    --s-lg: 24px;
    --s-xl: 32px;

    /* 字体族: 显式优先级, 让 macOS 自动走 SF Pro */
    --font-display: "Inter Variable", "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --font-text: "Inter Variable", "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;

    /* 唯一允许的投影 (本扩展内仅状态圆点等极少数情况使用)
       注意: Apple 系统对 UI chrome 不用阴影,仅用于"产品照片"。
       这里 popup 无产品图,默认全部无阴影保持平面观感。 */
    --shadow: none;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { -webkit-text-size-adjust: 100%; }

  body {
    width: 340px;
    max-width: 100vw;
    font-family: var(--font-text);
    background: var(--c-parchment);
    color: var(--c-ink);
    font-size: 15px;
    line-height: 1.5;
    letter-spacing: 0;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ===== Header Bar (参考 sub-nav-frosted: 羊皮卷 80% + 模糊化) ===== */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 44px;
    gap: 4px 8px;
    flex-wrap: wrap;
    padding: 6px 16px;
    background: rgba(245, 245, 247, 0.86);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-brand {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-brand img { width: 18px; height: 18px; }
  .header-name {
    /* Apple tagline token: 21px/600 — 在 popup 中缩到 14px 保持比例感 */
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 600;
    line-height: 1.19;
    letter-spacing: 0;
    color: var(--c-ink);
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-help {
    /* Apple button-icon-circular: 半透明圆片控件 */
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    border-radius: var(--r-pill);
    background: var(--c-chip);
    color: var(--c-ink);
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    line-height: 1;
    transition: transform 0.16s ease, background 0.16s ease, color 0.16s ease;
  }
  .header-help:hover {
    background: #c7c7cc;
    color: var(--c-accent);
  }
  .header-help:active { transform: scale(0.95); } /* Apple 系统级按压微交互 */
  .header-version {
    /* micro-legal token: 10px/400/-0.08px */
    font-size: 11px;
    color: var(--c-muted);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0;
  }

  .content { padding: var(--s-sm); } /* 12px 内容区外边距产生卡间距 */

  /* ===== Status Hero Card (参考 product-tile-light) ===== */
  .status-card {
    background: var(--c-canvas);
    border-radius: var(--r-lg);
    padding: 18px 18px 16px;
    margin-bottom: var(--s-sm);
    border: 1px solid var(--c-hairline);
    transition: border-color 0.2s ease, background 0.2s ease;
  }
  .status-card:has(.ac-dot.on) {
    border-color: rgba(0, 102, 204, 0.28);
  }
  .status-card:has(.ac-dot.unknown) {
    border-color: var(--c-hairline);
  }

  .ac-indicator {
    /* body-strong token: 17px/600/1.24/-0.374px */
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 17px;
    font-weight: 600;
    line-height: 1.24;
    letter-spacing: 0;
    margin-bottom: 4px;
    color: var(--c-ink);
  }
  .ac-dot {
    width: 9px; height: 9px;
    border: 2px solid transparent;
    border-radius: var(--r-pill);
    display: inline-block;
    flex-shrink: 0;
  }
  .ac-dot.on { background: var(--c-accent); }
  .ac-dot.off {
    background: transparent;
    border-color: var(--c-muted-2);
    border-radius: var(--r-xs);
  }
  .ac-dot.unknown {
    background: transparent;
    border-color: var(--c-chip);
  }

  .countdown-display {
    align-items: baseline;
    gap: 4px;
    font-size: 15px;
    color: var(--c-muted);
    line-height: 1.5;
    letter-spacing: 0;
  }
  .countdown-display strong {
    /* lead token-like: 28px/600,这是 popup 内最大的数字字
       略带正字距以呈现数字"主角"感 */
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 600;
    color: var(--c-ink);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.196px;
    line-height: 1.14;
  }

  .safetynet-warning {
    margin-top: var(--s-xs);
    padding: 8px 12px;
    background: var(--c-warning-bg);
    border: 1px solid var(--c-warning-border);
    border-radius: var(--r-md);
    color: var(--c-warning);
    font-size: 13px;
    line-height: 1.5;
    letter-spacing: 0;
    text-align: left;
  }

  /* ===== Settings Card (utility card: 白底 + 发丝边 + lg 圆角) ===== */
  .settings-card {
    background: var(--c-canvas);
    border-radius: var(--r-lg);
    margin-bottom: var(--s-sm);
    border: 1px solid var(--c-hairline);
    overflow: hidden;
  }
  .settings-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
    min-height: 56px;
    padding: 6px 16px;
    background: var(--c-canvas);
    border-bottom: 1px solid var(--c-divider);
  }
  .settings-header h3 {
    /* caption-strong token: 14px/600/1.29 — popup 内做卡头 */
    font-family: var(--font-display);
    font-size: 15px;
    color: var(--c-ink);
    letter-spacing: 0;
    font-weight: 600;
    line-height: 1.29;
    text-transform: none;
    margin: 0;
  }
  .toggle-area {
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 44px;
    margin-left: auto;
  }
  .toggle-state {
    font-size: 13px;
    color: var(--c-muted);
    white-space: nowrap;
    letter-spacing: 0;
  }

  /* Toggle Switch — Apple pill toggle 风格 */
  .toggle-switch {
    position: relative;
    display: inline-block;
    width: 46px;
    height: 44px;
    flex-shrink: 0;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute;
    cursor: pointer;
    top: 9px; left: 0; right: 0; bottom: 9px;
    background-color: var(--c-chip);
    transition: background-color 0.2s ease;
    border-radius: var(--r-pill);
  }
  .toggle-slider:before {
    position: absolute;
    content: "";
    height: 22px; width: 22px;
    left: 2px; bottom: 2px;
    background-color: white;
    transition: transform 0.2s ease;
    border-radius: var(--r-pill);
    /* 圆形 knob 上保留必要阴影以保留可见度 (Apple 自家 toggle
       在系统层级也有此阴影;UI chrome 模式仍保持平面观感) */
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.18);
  }
  .toggle-switch input:checked + .toggle-slider {
    background-color: var(--c-accent);
  }
  .toggle-switch input:checked + .toggle-slider:before {
    transform: translateX(20px);
  }
  .toggle-switch input:disabled + .toggle-slider {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .toggle-switch input:focus-visible + .toggle-slider {
    outline: 2px solid var(--c-accent-hover);
    outline-offset: 2px;
  }
  .toggle-switch:has(input:checked) {
    transform-origin: right center;
  }
  .toggle-switch input:checked + .toggle-slider:active {
    /* 按下时与 Action Blue 同键触发的 微交互缩放 */
    transform: scale(0.96);
  }

  .settings-body { padding: 14px 16px 16px; }

  /* ===== PWM 运行时段行 (configurator-chip 风格的小药丸) ===== */
  .active-hours-row {
    display: flex;
    align-items: center;
    padding-bottom: var(--s-sm);
    margin-bottom: var(--s-sm);
    border-bottom: 1px solid var(--c-divider);
    gap: 8px;
    flex-wrap: wrap;
  }
  .active-hours-row label.ah-label {
    font-size: 14px;
    font-weight: 400;
    line-height: 1.43;
    letter-spacing: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    min-height: 44px;
    gap: 7px;
    flex-shrink: 0;
    color: var(--c-ink-80);
  }
  .active-hours-row input[type="checkbox"] {
    width: 16px; height: 16px;
    cursor: pointer;
    accent-color: var(--c-accent);
  }
  .active-hours-row input[type="time"] {
    border: 1px solid var(--c-hairline);
    border-radius: var(--r-pill);
    padding: 6px 10px;
    font-size: 14px;
    line-height: 1.5;
    letter-spacing: 0;
    background: var(--c-pearl);
    color: var(--c-ink);
    font-variant-numeric: tabular-nums;
    width: 92px;
    min-height: 44px;
    transition: border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
  }
  .active-hours-row input[type="time"]:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .active-hours-row input[type="time"]:not(:disabled):hover:not(:focus) {
    border-color: #c7c7cc;
  }
  .active-hours-row input[type="time"]:not(:disabled):focus {
    border-color: var(--c-accent);
    box-shadow: 0 0 0 3px var(--c-accent-ring);
    outline: none;
    background: var(--c-canvas);
  }
  .active-hours-row .ah-sep {
    color: var(--c-muted);
    font-size: 13px;
    letter-spacing: 0;
  }

  .active-hours-row .ah-status {
    margin-left: auto;
    font-size: 12px;
    padding: 4px 9px;
    border-radius: var(--r-pill);
    background: var(--c-pearl);
    color: var(--c-muted);
    border: 1px solid var(--c-hairline);
    white-space: nowrap;
    line-height: 1.2;
    letter-spacing: 0;
  }
  .active-hours-row .ah-status.active {
    background: var(--c-accent-soft);
    color: var(--c-accent);
    border: 1px solid rgba(0, 102, 204, 0.18);
  }
  .active-hours-row .ah-status.idle {
    background: var(--c-pearl);
    color: var(--c-muted);
    border: 1px solid var(--c-hairline);
  }

  /* Time rows (-pills 输入) */
  .time-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--s-xs);
  }
  .time-row:last-of-type { margin-bottom: 0; }
  .time-row label {
    font-size: 14px;
    font-weight: 400;
    line-height: 1.43;
    letter-spacing: 0;
    color: var(--c-ink-80);
  }
  .time-row input[type="number"] {
    border: 1px solid var(--c-hairline);
    border-radius: var(--r-pill);
    padding: 7px 12px;
    font-size: 14px;
    line-height: 1.43;
    letter-spacing: 0;
    width: 96px;
    min-height: 44px;
    background: var(--c-pearl);
    color: var(--c-ink);
    transition: border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .time-row input[type="number"]:focus {
    border-color: var(--c-accent);
    box-shadow: 0 0 0 3px var(--c-accent-ring);
    outline: none;
    background: var(--c-canvas);
  }
  .time-row input[type="number"]:hover:not(:focus) {
    border-color: #c7c7cc;
  }
  /* 隐藏 number 输入框的 spinner 以保持 Apple 极简观感 */
  .time-row input[type="number"]::-webkit-inner-spin-button,
  .time-row input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .time-row input[type="number"] {
    -moz-appearance: textfield;
    appearance: textfield;
  }

  .hint {
    color: var(--c-muted);
    font-size: 13px;
    line-height: 1.5;
    letter-spacing: 0;
    margin-top: var(--s-xs);
  }
  .hint-pin {
    border-top: 1px solid var(--c-divider);
    padding-top: var(--s-xs);
    margin-top: var(--s-xs);
    color: var(--c-ink-80);
    font-weight: 500;
  }

  /* ===== Footer (Apple footer: 紧致法定信息 + 单行链) ===== */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    flex-wrap: wrap;
    padding-top: var(--s-xxs);
  }
  .status {
    font-size: 13px;
    color: var(--c-muted);
    flex: 1;
    min-height: 20px;
    line-height: 1.5;
    letter-spacing: 0;
  }
  .status.success { color: var(--c-accent); }
  .status.error { color: var(--c-danger); }

  .btn-diagnose {
    /* button-secondary-pill token: 透明底 + Action Blue 描边 + pill */
    font-family: var(--font-text);
    font-size: 13px;
    font-weight: 400;
    line-height: 1.29;
    letter-spacing: 0;
    color: var(--c-accent);
    background: var(--c-canvas);
    border: 1px solid var(--c-accent);
    border-radius: var(--r-pill);
    padding: 6px 14px;
    min-height: 44px;
    cursor: pointer;
    white-space: nowrap;
    transition: transform 0.16s ease, background 0.16s ease, color 0.16s ease;
  }
  .btn-diagnose:hover {
    background: var(--c-accent);
    color: var(--c-canvas);
  }
  .btn-diagnose:active { transform: scale(0.95); } /* Apple 系统级按压反馈 */

  .diagnose-result {
    font-family: var(--font-text);
    font-size: 13px;
    color: var(--c-muted);
    margin-top: var(--s-xs);
    line-height: 1.6;
    display: none;
    overflow-wrap: anywhere;
  }

  .visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  @media (max-width: 300px) {
    .settings-header,
    .time-row {
      align-items: stretch;
      flex-direction: column;
    }
    .toggle-area {
      justify-content: space-between;
      margin-left: 0;
    }
    .time-row input[type="number"] {
      width: 100%;
    }
    .active-hours-row .ah-status {
      margin-left: 0;
    }
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --c-accent: #409cff;
      --c-accent-hover: #64b5ff;
      --c-accent-ring: rgba(64, 156, 255, 0.36);
      --c-accent-soft: rgba(64, 156, 255, 0.2);
      --c-canvas: #1c1c1e;
      --c-parchment: #000000;
      --c-pearl: #2c2c2e;
      --c-ink: #f5f5f7;
      --c-ink-80: #e5e5ea;
      --c-muted: #aeaeb2;
      --c-muted-2: #8e8e93;
      --c-hairline: #48484a;
      --c-divider: #38383a;
      --c-chip: #48484a;
      --c-success: #30d158;
      --c-success-bg: #1b3324;
      --c-warning: #ffb340;
      --c-warning-bg: #3a2c16;
      --c-warning-border: rgba(255, 179, 64, 0.5);
      --c-danger: #ff6961;
    }
    .header {
      background: rgba(28, 28, 30, 0.9);
      border-bottom-color: rgba(255, 255, 255, 0.16);
    }
    .header-help {
      background: #48484a;
    }
    .header-help:hover,
    .active-hours-row input[type="time"]:not(:disabled):hover:not(:focus),
    .time-row input[type="number"]:hover:not(:focus) {
      border-color: #8e8e93;
    }
    .header-help:hover {
      background: #636366;
    }
    .toggle-slider:before {
      background-color: #f5f5f7;
    }
  }

  @media (prefers-contrast: more) {
    :root {
      --c-muted: #4d4d4d;
      --c-muted-2: #4d4d4d;
      --c-hairline: #666666;
      --c-divider: #767676;
      --c-warning-border: #8b4300;
    }
    .status-card,
    .settings-card {
      border-width: 2px;
    }
  }

  @media (prefers-color-scheme: dark) and (prefers-contrast: more) {
    :root {
      --c-muted: #f2f2f7;
      --c-muted-2: #f2f2f7;
      --c-hairline: #d1d1d6;
      --c-divider: #aeaeb2;
      --c-warning-border: #ffd60a;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      scroll-behavior: auto !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* 焦点环: Action Blue 2px outline (Apple 的 focus 信号) */
  button:focus-visible,
  a:focus-visible,
  input:focus-visible,
  .header-help:focus-visible {
    outline: 2px solid var(--c-accent-hover);
    outline-offset: 2px;
    border-radius: var(--r-pill);
  }
</style>
</head>
<body>

  <!-- Compact header bar: icon + name | help | version -->
  <div class="header">
    <div class="header-brand">
      <img src="icons/icon16.png" alt="">
      <span class="header-name">AC-UST</span>
    </div>
    <div class="header-right">
      <a class="header-help" id="helpLink" href="https://github.com/BelugaRex/ac-ust#readme" target="_blank" rel="noopener" title="" data-i18n-title="helpTooltip" data-i18n-aria-label="helpTooltip">?</a>
      <span class="header-version" id="versionInfo">v--</span>
    </div>
  </div>

  <div class="content">

    <!-- Status hero card: AC state + countdown + safetynet -->
    <div class="status-card" id="statusCard" role="region" aria-labelledby="acStateText">
      <div class="ac-indicator">
        <span class="ac-dot unknown" id="acDot" aria-hidden="true"></span>
        <span id="acStateText" data-i18n="acLoading"></span>
      </div>
      <div class="countdown-display" id="countdownDisplay" style="display:none">
        <span id="countdownText">--</span>
      </div>
      <div class="countdown-display" id="idleDisplay" style="display:none">
        <span style="color:var(--c-muted)" data-i18n="acIdle"></span>
      </div>
      <div class="safetynet-warning" id="safetynetWarning" role="status" aria-live="polite" aria-atomic="true" style="display:none"></div>
    </div>
    <p class="visually-hidden" id="statusAnnouncement" role="status" aria-live="polite" aria-atomic="true"></p>

    <!-- Settings card: toggle in header, clock/interval in body -->
    <div class="settings-card" role="group" aria-labelledby="pwmSettingsTitle">
      <div class="settings-header">
        <h3 id="pwmSettingsTitle" data-i18n="pwmSettings"></h3>
        <div class="toggle-area">
          <span class="toggle-state" id="timerToggleState" data-i18n="timerDisabled" aria-live="polite" aria-atomic="true"></span>
          <label class="toggle-switch">
            <input type="checkbox" id="timerToggle" aria-labelledby="pwmSettingsTitle" aria-describedby="timerToggleState">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      <div class="settings-body">
        <div class="active-hours-row" id="activeHoursRow">
          <label class="ah-label">
            <input type="checkbox" id="activeHoursToggle">
            <span data-i18n="activeHoursLabel"></span>
          </label>
          <input type="time" id="activeHoursStart" value="08:00" data-i18n-aria-label="activeHoursStartLabel">
          <span class="ah-sep">—</span>
          <input type="time" id="activeHoursEnd" value="23:00" data-i18n-aria-label="activeHoursEndLabel">
          <span class="ah-status" id="activeHoursStatus"></span>
        </div>
        <div id="intervalInputs">
          <div class="time-row">
            <label for="onMinutes" data-i18n="onMinutesLabel"></label>
            <input type="number" id="onMinutes" value="30" min="1" step="1">
          </div>
          <div class="time-row">
            <label for="offMinutes" data-i18n="offMinutesLabel"></label>
            <input type="number" id="offMinutes" value="30" min="1" step="1">
          </div>
        </div>
        <div class="hint hint-pin" id="scheduleHintPin" data-i18n="scheduleHintPinTab"></div>
      </div>
    </div>

    <!-- Footer: status message + diagnose button + results -->
    <div class="footer">
      <div class="status" id="status" role="status" aria-live="polite" aria-atomic="true"></div>
      <button class="btn-diagnose" id="btnDiagnose" data-i18n="btnDiagnose"></button>
    </div>
    <div class="diagnose-result" id="diagnoseResult" role="region" tabindex="0" aria-live="off" data-i18n-aria-label="diagnoseResultLabel"></div>

  </div>

<script src="i18n.js"></script>
<script src="popup.js"></script>
</body>
</html>
