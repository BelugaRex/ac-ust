<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  /* ===== Design Tokens ===== */
  :root {
    --bg: #f1f5f9;
    --surface: #ffffff;
    --text: #0f172a;
    --text-2: #475569;
    --muted: #94a3b8;
    --border: #e2e8f0;
    --border-2: #f1f5f9;
    --accent: #3b82f6;
    --accent-ring: #dbeafe;
    --green: #22c55e;
    --green-bg: #f0fdf4;
    --green-bd: #bbf7d0;
    --green-dk: #166534;
    --amber: #fbbf24;
    --amber-bg: #fffbeb;
    --amber-bd: #fde68a;
    --amber-dk: #92400e;
    --orange-bg: #fff7ed;
    --orange-bd: #fed7aa;
    --orange-dk: #9a3412;
    --red: #ef4444;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 8px -2px rgba(0,0,0,0.03);
    --r: 12px;
    --r-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 320px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* ===== Header Bar ===== */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .header-brand {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .header-brand img { width: 16px; height: 16px; }
  .header-name {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.3px;
    color: var(--text);
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-help {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--border-2);
    color: var(--text-2);
    font-size: 11px;
    font-weight: 600;
    text-decoration: none;
    transition: background 0.2s, color 0.2s;
  }
  .header-help:hover {
    background: var(--accent-ring);
    color: var(--accent);
  }
  .header-version {
    font-size: 10px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  .content { padding: 10px 12px 12px; }

  /* ===== Status Hero Card ===== */
  .status-card {
    background: var(--surface);
    border-radius: var(--r);
    padding: 13px 14px;
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    border-left: 3px solid var(--muted);
    transition: border-color 0.3s, background 0.3s;
  }
  /* Dynamic border color via :has() — Chrome/Edge 105+ */
  .status-card:has(.ac-dot.on) {
    border-left-color: var(--green);
    background: linear-gradient(135deg, rgba(34,197,94,0.03) 0%, var(--surface) 50%);
  }
  .status-card:has(.ac-dot.unknown) {
    border-left-color: var(--amber);
  }

  .ac-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .ac-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }
  .ac-dot.on { background: var(--green); box-shadow: 0 0 8px rgba(34,197,94,0.45); }
  .ac-dot.off { background: var(--muted); }
  .ac-dot.unknown { background: var(--amber); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.4 } }

  .countdown-display {
    align-items: baseline;
    gap: 4px;
    font-size: 12px;
    color: var(--text-2);
    line-height: 1.5;
  }
  .countdown-display strong {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  .safetynet-hint {
    margin-top: 8px;
    padding: 5px 10px;
    background: var(--green-bg);
    border: 1px solid var(--green-bd);
    border-radius: var(--r-sm);
    color: var(--green-dk);
    font-size: 11px;
    line-height: 1.4;
    text-align: center;
  }
  .safetynet-warning {
    margin-top: 6px;
    padding: 5px 10px;
    background: var(--orange-bg);
    border: 1px solid var(--orange-bd);
    border-radius: var(--r-sm);
    color: var(--orange-dk);
    font-size: 11px;
    line-height: 1.4;
    text-align: center;
  }

  /* ===== Settings Card (toggle integrated in header) ===== */
  .settings-card {
    background: var(--surface);
    border-radius: var(--r);
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .settings-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
    border-bottom: 1px solid var(--border);
  }
  .settings-header h3 {
    font-size: 11px;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  .toggle-area {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toggle-label {
    font-size: 11px;
    color: var(--text-2);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }

  /* Toggle Switch */
  .toggle-switch {
    position: relative;
    display: inline-block;
    width: 44px;
    height: 24px;
    flex-shrink: 0;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: #cbd5e1;
    transition: 0.25s;
    border-radius: 24px;
  }
  .toggle-slider:before {
    position: absolute;
    content: "";
    height: 18px; width: 18px;
    left: 3px; bottom: 3px;
    background-color: white;
    transition: 0.25s;
    border-radius: 50%;
    box-shadow: 0 1px 2px rgba(0,0,0,0.15);
  }
  .toggle-switch input:checked + .toggle-slider {
    background-color: var(--green);
  }
  .toggle-switch input:checked + .toggle-slider:before {
    transform: translateX(20px);
  }
  .toggle-switch input:disabled + .toggle-slider {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .settings-body { padding: 10px 14px 12px; }

  /* Clock mode row 已删除 v0.5.x */
  .active-hours-row {
    display: flex;
    align-items: center;
    padding-bottom: 8px;
    margin-bottom: 8px;
    border-bottom: 1px dashed var(--border);
    gap: 8px;
    flex-wrap: wrap;
  }
  .active-hours-row label.ah-label {
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .active-hours-row input[type="checkbox"] {
    width: 15px; height: 15px;
    cursor: pointer;
    accent-color: var(--accent);
  }
  .active-hours-row input[type="time"] {
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    padding: 3px 6px;
    font-size: 12px;
    background: var(--border-2);
    color: var(--text);
    font-variant-numeric: tabular-nums;
    width: 88px;
  }
  .active-hours-row input[type="time"]:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .active-hours-row input[type="time"]:not(:disabled):hover:not(:focus) {
    border-color: #cbd5e1;
  }
  .active-hours-row input[type="time"]:not(:disabled):focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-ring);
    outline: none;
    background: var(--surface);
  }
  .active-hours-row .ah-sep {
    color: var(--muted);
    font-size: 11px;
  }
  .active-hours-row .ah-status {
    margin-left: auto;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    background: var(--border-2);
    color: var(--text-2);
    white-space: nowrap;
  }
  .active-hours-row .ah-status.active {
    background: var(--green-bg);
    color: var(--green-dk);
    border: 1px solid var(--green-bd);
  }
  .active-hours-row .ah-status.idle {
    background: var(--amber-bg);
    color: var(--amber-dk);
    border: 1px solid var(--amber-bd);
  }

  /* Time rows */
  .time-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 7px;
  }
  .time-row:last-of-type { margin-bottom: 0; }
  .time-row label { font-size: 13px; font-weight: 500; }
  .time-row input[type="number"] {
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    padding: 5px 10px;
    font-size: 13px;
    width: 90px;
    background: var(--border-2);
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .time-row input[type="number"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-ring);
    outline: none;
    background: var(--surface);
  }
  .time-row input[type="number"]:hover:not(:focus) {
    border-color: #cbd5e1;
  }

  .hint {
    color: var(--muted);
    font-size: 11px;
    line-height: 1.45;
    margin-top: 8px;
  }

  /* ===== Footer ===== */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .status {
    font-size: 11px;
    color: var(--muted);
    flex: 1;
    min-height: 16px;
  }
  .status.success { color: var(--green); }
  .status.error { color: #dc2626; }

  .btn-diagnose {
    font-size: 11px;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    padding: 3px 10px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-diagnose:hover {
    background: #f8fafc;
    border-color: #cbd5e1;
    color: var(--text-2);
  }

  .diagnose-result {
    font-size: 10px;
    color: var(--muted);
    margin-top: 6px;
    line-height: 1.5;
    display: none;
    word-break: break-word;
  }
</style>
</head>
<body>

  <!-- Compact header bar: icon + name | help | version -->
  <div class="header">
    <div class="header-brand">
      <img src="icons/icon16.png" alt="">
      <span class="header-name">AC-UST</span>
    </div>
    <div class="header-right">
      <a class="header-help" id="helpLink" href="https://github.com/BelugaRex/ac-ust#readme" target="_blank" rel="noopener" title="" data-i18n-title="helpTooltip">?</a>
      <span class="header-version" id="versionInfo">v--</span>
    </div>
  </div>

  <div class="content">

    <!-- Status hero card: AC state + countdown + safetynet -->
    <div class="status-card" id="statusCard">
      <div class="ac-indicator">
        <span class="ac-dot unknown" id="acDot"></span>
        <span id="acStateText" data-i18n="acLoading"></span>
      </div>
      <div class="countdown-display" id="countdownDisplay" style="display:none">
        <span id="countdownText">--</span>
      </div>
      <div class="countdown-display" id="idleDisplay" style="display:none">
        <span style="color:var(--muted)" data-i18n="acIdle"></span>
      </div>
      <div class="safetynet-hint" id="safetynetHint" style="display:none" data-i18n="safetynetSet">
      </div>
      <div class="safetynet-warning" id="safetynetWarning" style="display:none"></div>
    </div>

    <!-- Settings card: toggle in header, clock/interval in body -->
    <div class="settings-card">
      <div class="settings-header">
        <h3 data-i18n="pwmSettings"></h3>
        <div class="toggle-area">
          <span class="toggle-label" id="timerToggleLabel" data-i18n="timerDisabled"></span>
          <label class="toggle-switch">
            <input type="checkbox" id="timerToggle">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      <div class="settings-body">
        <div class="active-hours-row" id="activeHoursRow">
          <label class="ah-label">
            <input type="checkbox" id="activeHoursToggle">
            <span data-i18n="activeHoursLabel"></span>
          </label>
          <input type="time" id="activeHoursStart" value="08:00" aria-label="start">
          <span class="ah-sep">—</span>
          <input type="time" id="activeHoursEnd" value="23:00" aria-label="end">
          <span class="ah-status" id="activeHoursStatus"></span>
        </div>
        <div id="intervalInputs">
          <div class="time-row">
            <label data-i18n="onMinutesLabel"></label>
            <input type="number" id="onMinutes" value="30" min="1" step="1">
          </div>
          <div class="time-row">
            <label data-i18n="offMinutesLabel"></label>
            <input type="number" id="offMinutes" value="30" min="1" step="1">
          </div>
        </div>
        <div class="hint" id="scheduleHint" data-i18n="scheduleHintDefault"></div>
      </div>
    </div>

    <!-- Footer: status message + diagnose button + results -->
    <div class="footer">
      <div class="status" id="status"></div>
      <button class="btn-diagnose" id="btnDiagnose" data-i18n="btnDiagnose"></button>
    </div>
    <div class="diagnose-result" id="diagnoseResult"></div>

  </div>

<script src="i18n.js"></script>
<script src="popup.js"></script>
</body>
</html>
