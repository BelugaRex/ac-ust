name: CI

on:
  pull_request:
    branches: [main, beta-rex]
  push:
    branches: [main, beta-rex]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run unit tests
        run: node test/verify-fix.mjs
