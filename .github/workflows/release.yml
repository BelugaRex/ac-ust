name: Release on Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find CRX file
        id: crx
        run: |
          CRX=$(ls releases/ac-ust-*.crx 2>/dev/null | head -1)
          if [ -z "$CRX" ]; then
            echo "No CRX found in releases/"
            echo "crx_found=false" >> $GITHUB_OUTPUT
          else
            echo "crx_path=$CRX" >> $GITHUB_OUTPUT
            echo "crx_name=$(basename $CRX)" >> $GITHUB_OUTPUT
            echo "crx_found=true" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          body: |
            ## AC-UST ${{ github.ref_name }}

            公测版本。
            
            ### 安装方法

            下载 `.crx` 文件，拖入 `chrome://extensions` 页面即可安装。

            详见 [releases/README.md](https://github.com/BelugaRex/ac-ust/blob/beta-rex/releases/README.md)。
          files: |
            releases/ac-ust-*.crx
          generate_release_notes: false
